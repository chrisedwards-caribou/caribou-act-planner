<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Caribou — Resource Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F0EEF0;--surface:#FFFFFF;--off-white:#F7F5F7;--chalk:#EAE7EA;--pebble:#E0DCE0;
  --plum:#4A334E;--plum-light:#6F5175;--tangerine:#E8642A;--clover:#287F66;
  --naranja:#FFA31D;--red:#C0392B;--lavender:#8777B2;--spring:#B6D3B6;
  --live:#287F66;--contracted:#8777B2;--pipeline:#FFA31D;--leave:#F4A7A0;--free-bar:#B6D3B6;
  --text:#1E1125;--text-2:#4A334E;--text-3:#8A7A8E;
  --border:#D8D0D8;--border-strong:#B0A0B4;
  --r:10px;--rsm:6px;--fb:'Public Sans',sans-serif;--fh:'Crimson Text',serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--fb);background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;}
/* HEADER */
.hdr{background:var(--plum);padding:0 20px;height:46px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
.logo-wrap{display:flex;align-items:center;gap:8px;}
.logo-img{height:20px;}
.hdr-title{font-family:var(--fh);font-size:16px;color:rgba(255,255,255,0.85);font-style:italic;border-left:1px solid rgba(255,255,255,0.2);padding-left:14px;margin-left:2px;}
.tabs{display:flex;gap:2px;margin-left:auto;}
.tab{padding:6px 14px;border-radius:var(--rsm);font-size:12px;font-weight:500;color:rgba(255,255,255,0.65);background:transparent;border:none;cursor:pointer;transition:all 0.15s;}
.tab:hover{color:white;background:rgba(255,255,255,0.1);}
.tab.active{background:var(--tangerine);color:white;}
.win-btns{display:flex;gap:4px;margin-left:8px;border-left:1px solid rgba(255,255,255,0.2);padding-left:12px;}
.win-btn{padding:4px 10px;border-radius:var(--rsm);font-size:11px;font-weight:600;color:rgba(255,255,255,0.6);background:transparent;border:1px solid rgba(255,255,255,0.2);cursor:pointer;transition:all 0.15s;}
.win-btn.active{background:var(--tangerine);color:white;border-color:var(--tangerine);}
.hdr-month{margin-left:8px;display:flex;align-items:center;gap:6px;}
.hdr-month button{background:transparent;border:none;color:rgba(255,255,255,0.6);cursor:pointer;font-size:14px;padding:2px 6px;}
.hdr-month button:hover{color:white;}
.hdr-month span{color:white;font-size:12px;font-weight:600;min-width:64px;text-align:center;}
/* ALERTS BANNER */
.alerts-banner{background:var(--surface);border-bottom:2px solid var(--border);position:sticky;top:46px;z-index:99;}
.alerts-banner-hdr{display:flex;align-items:center;gap:8px;padding:7px 20px;cursor:pointer;user-select:none;}
.alerts-banner-hdr:hover{background:var(--off-white);}
.alert-badge{background:var(--tangerine);color:white;border-radius:99px;font-size:10px;font-weight:700;padding:1px 7px;min-width:20px;text-align:center;}
.alerts-body{padding:6px 20px 10px;border-top:1px solid var(--border);}
.impl-item{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.impl-item:last-child{border-bottom:none;}
.impl-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.impl-red{background:#FDE8E6;} .impl-amber{background:#FEF3E2;} .impl-blue{background:#E8F4FD;}
.impl-body{flex:1;}
.impl-title{font-size:12px;font-weight:600;color:var(--plum);}
.impl-detail{font-size:11px;color:var(--text-2);margin-top:1px;}
/* MAIN */
.main{padding:14px 18px;max-width:1400px;margin:0 auto;}
.view-hint{font-size:11px;color:var(--text-3);margin-bottom:8px;text-align:right;}
/* LEGEND */
.tab-legend{display:flex;align-items:center;gap:14px;margin-bottom:10px;flex-wrap:wrap;padding:7px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-3);}
.legend-dot{width:10px;height:10px;border-radius:50%;}
/* SUMMARY CARDS */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px;}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;transition:box-shadow 0.15s;}
.scard.clickable{cursor:pointer;}
.scard.clickable:hover{box-shadow:0 2px 12px rgba(30,17,37,0.12);}
.scard-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-3);margin-bottom:6px;}
.scard-val{font-family:var(--fh);font-size:32px;font-weight:600;line-height:1;margin-bottom:4px;}
.scard-sub{font-size:11px;color:var(--text-3);}
.scard-names{font-size:10px;color:var(--text-3);margin-top:3px;font-style:italic;line-height:1.5;}
.cg{color:var(--clover);} .cr{color:var(--red);} .ca{color:var(--naranja);} .cp{color:var(--plum);}
/* OVERVIEW */
.ov-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;align-items:stretch;}
.ovsec{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;}
.ovsec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-3);margin-bottom:10px;}
/* POPOVER */
.popover-overlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.2);}
.popover-box{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;z-index:1000;min-width:360px;max-width:540px;box-shadow:0 8px 32px rgba(0,0,0,0.2);max-height:80vh;overflow-y:auto;}
/* PERSON CARDS */
.card-grid{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start;}
.pgcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all 0.15s;flex:0 0 calc(33.333% - 7px);min-width:260px;}
.pgcard:hover{box-shadow:0 2px 10px rgba(30,17,37,0.1);}
.pgcard.good{border-top:3px solid var(--clover);background:linear-gradient(180deg,#F0FAF5 0%,#FFFFFF 40%);}
.pgcard.below{border-top:3px solid var(--naranja);background:linear-gradient(180deg,#FFF8EE 0%,#FFFFFF 40%);}
.pgcard.over{background:linear-gradient(135deg,#FDE8E6 0%,#FFF8F8 100%);border:2px solid var(--red);box-shadow:0 0 0 1px rgba(192,57,43,0.15);}
.pgcard-head{padding:10px 12px;display:flex;align-items:center;gap:8px;}
.pgcard-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;position:relative;}
.pgcard-info{flex:1;min-width:0;}
.pgcard-name{font-family:var(--fh);font-size:14px;font-weight:600;color:var(--plum);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pgcard-role{font-size:10px;color:var(--text-3);}
.pgcard-meta{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.pgcard-bar{height:7px;margin:0 12px 3px;border-radius:3px;background:var(--pebble);position:relative;overflow:hidden;}
.pgcard-bar-fill{height:100%;border-radius:3px;display:flex;}
.pgcard-bar-target{position:absolute;top:-2px;height:11px;width:2px;background:var(--plum);border-radius:1px;z-index:1;}
.pgcard-stats{display:flex;justify-content:space-between;align-items:center;padding:0 12px 8px;font-size:10px;color:var(--text-3);}
.free-bubble{display:inline-flex;align-items:center;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:700;background:var(--spring);color:#1A5C48;}
.over-bubble{display:inline-flex;align-items:center;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:700;background:#FDE8E6;color:var(--red);}
.pgcard-expand{border-top:1px solid var(--border);background:var(--off-white);display:none;}
.pgcard-expand.open{display:block;}
/* PROJECT CARDS */
.pjcard-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;}
.pjgcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:box-shadow 0.15s;}
.pjgcard:hover{box-shadow:0 2px 10px rgba(30,17,37,0.1);}
.pjgcard-head{padding:11px 13px;}
.pjgcard-expand{border-top:1px solid var(--border);background:var(--off-white);display:none;padding:10px 13px;}
.pjgcard-expand.open{display:block;}
.proj-loe-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.proj-loe-name{min-width:80px;font-size:11px;color:var(--text-2);}
.proj-loe-track{flex:1;height:8px;background:var(--pebble);border-radius:3px;position:relative;}
.proj-loe-budget{position:absolute;top:0;left:0;height:100%;background:var(--border-strong);border-radius:3px;opacity:0.4;}
.proj-loe-actual{position:absolute;top:0;left:0;height:100%;border-radius:3px;}
.proj-loe-overflow{position:absolute;top:-2px;height:12px;width:3px;background:var(--red);border-radius:0 2px 2px 0;}
.proj-loe-nums{min-width:75px;font-size:10px;color:var(--text-3);text-align:right;}
/* PERSON EXPAND TABS */
.pd-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 12px;background:var(--surface);}
.pd-tab{padding:7px 12px;font-size:11px;font-weight:600;color:var(--text-3);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
.pd-tab.active{color:var(--plum);border-bottom-color:var(--tangerine);}
.pd-panel{display:none;padding:10px 12px;}
.pd-panel.active{display:block;}
/* FILTERS */
.filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:10px;}
.filter-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--text-3);flex-shrink:0;}
.sort-btn{padding:3px 10px;border:1px solid var(--border-strong);border-radius:99px;background:transparent;cursor:pointer;font-size:11px;font-family:var(--fb);color:var(--text-2);margin:1px;transition:all 0.1s;}
.sort-btn:hover{border-color:var(--plum);color:var(--plum);}
.sort-btn.active{background:var(--tangerine);color:white;border-color:var(--tangerine);}
/* TABLE */
.dt{width:100%;border-collapse:collapse;font-size:11px;}
.dt th{text-align:left;padding:4px 6px;color:var(--text-3);font-weight:600;border-bottom:1px solid var(--border);}
.dt td{padding:4px 6px;border-bottom:1px solid var(--border);vertical-align:middle;}
.dt tr:last-child td{border-bottom:none;}
/* PILLS */
.pill{display:inline-flex;align-items:center;padding:1px 6px;border-radius:99px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;}
.p-pl{background:var(--plum);color:white;}
.p-teal{background:#E6F4F0;color:#1A5C48;}
.p-gy{background:var(--pebble);color:var(--text-2);}
.p-risk{background:#FDE8E6;color:var(--red);}
.p-live{background:#E6F4F0;color:var(--clover);}
.p-contracted{background:#EEE8F6;color:var(--lavender);}
.p-pipeline{background:#FEF3E2;color:#9A6200;}
.callout{padding:6px 10px;border-radius:var(--rsm);font-size:11px;margin-bottom:6px;}
.co-g{background:#E6F4F0;color:#1A5C48;border-left:3px solid var(--clover);}
.co-a{background:#FEF3E2;color:#7A4F00;border-left:3px solid var(--naranja);}
.co-risk{background:#FDE8E6;color:#8B1A1A;border-left:3px solid var(--red);}
/* SKILLS */
.ssg{margin-bottom:10px;}
.ssg-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-3);margin-bottom:5px;}
.tchip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;border:1px solid var(--border-strong);background:transparent;cursor:pointer;font-size:11px;font-family:var(--fb);color:var(--text-2);margin:2px;transition:all 0.1s;}
.tchip:hover{border-color:var(--tangerine);color:var(--tangerine);}
.tchip.active{background:var(--tangerine);color:white;border-color:var(--tangerine);}
.sschip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;border:1px solid var(--border-strong);background:transparent;cursor:pointer;font-size:11px;font-family:var(--fb);color:var(--text-2);margin:2px;transition:all 0.1s;}
.sschip:hover{border-color:var(--plum);color:var(--plum);}
.sschip.active{background:var(--plum);color:white;border-color:var(--plum);}
.f-atag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;background:var(--tangerine);color:white;font-size:10px;margin:2px;}
.f-atag button{background:transparent;border:none;color:white;cursor:pointer;font-size:12px;padding:0;line-height:1;}
.avail-bar{height:8px;background:var(--pebble);border-radius:3px;overflow:hidden;margin-top:4px;}
.avail-fill{height:100%;border-radius:3px;}
/* PERSON DETAIL */
.fte-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.ftem{background:var(--off-white);border-radius:var(--rsm);padding:6px 8px;}
.ftem-l{font-size:10px;color:var(--text-3);}
.ftem-v{font-size:14px;font-weight:600;font-family:var(--fh);}
.pchip{display:inline-flex;align-items:center;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700;cursor:pointer;margin:1px;}
.tag{display:inline-flex;align-items:center;padding:1px 6px;border-radius:99px;font-size:9px;font-weight:700;}
.t-lh{background:#FEF3E2;color:#9A6200;}
.t-lm{background:#E6F4F0;color:#1A5C48;}
.t-ll{background:var(--pebble);color:var(--text-2);}
.ct-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;}
/* SPARKLINES */
.sparkline-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;}
.spark-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;cursor:pointer;transition:box-shadow 0.15s;}
.spark-card:hover{box-shadow:0 2px 8px rgba(30,17,37,0.1);}
/* PROJECT MATRIX */
.proj-matrix{width:100%;border-collapse:separate;border-spacing:2px;font-size:11px;}
.proj-matrix th{text-align:left;padding:5px 8px;color:var(--text-3);font-weight:600;white-space:nowrap;}
.proj-matrix td{padding:0;border-radius:4px;vertical-align:top;}
.proj-cell{padding:5px 7px;border-radius:4px;cursor:default;min-height:36px;}
.proj-cell:hover{filter:brightness(0.95);}
/* STRENGTH BARS */
.strength-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.strength-label{min-width:140px;font-size:10px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.strength-bar{flex:1;height:10px;border-radius:3px;}
.strength-count{min-width:30px;font-size:10px;color:var(--text-3);text-align:right;}
/* LOADING */
@keyframes loadbar{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}
</style>
</head>

function applyPersonStyles(arr,skillsByPerson,themesByPerson){
  return arr.map((p,i)=>{
    const s=PERSON_STYLES[p.name]||{col:"#604D64",tc:"#FFFFFF",initials:p.name.slice(0,2).toUpperCase()};
    const pSkills=(skillsByPerson||{})[p.name]||{};
    const skillScores={};SS.forEach(s2=>{skillScores[s2.id]=pSkills[s2.l]||0;});
    const themeScores={};Object.entries((themesByPerson||{})[p.name]||{}).forEach(([t,sc])=>{themeScores[t]=sc;});
    return Object.assign({id:i+1,col:s.col,tc:s.tc,initials:s.initials,
      customTitle:p.name==="Anan A."?"Head of Strategic Comms":null,
      skills:skillScores,themes:themeScores},p);
  });
}

async function loadNotionData(){
  try{
    const res=await fetch(NETLIFY_FN);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    const newPeople=applyPersonStyles(data.people||[],data.skillsByPerson,data.themesByPerson);
    const newProjects=(data.projects||[]).map(p=>({
      id:p.projectId,name:p.name,client:p.client,status:p.status,lift:p.lift,
      endDate:p.endDate?p.endDate.slice(0,7):null
    }));
    if(!newProjects.find(p=>p.id==='INT'))
      newProjects.push({id:'INT',name:'Internal',client:'Caribou',status:'internal',lift:null,endDate:null});
    people.length=0;newPeople.forEach(p=>people.push(p));
    projects.length=0;newProjects.forEach(p=>projects.push(p));
    Object.keys(allocs).forEach(k=>delete allocs[k]);
    Object.entries(data.allocations||{}).forEach(([k,v])=>{allocs[parseInt(k)]=v;});
    Object.keys(loe).forEach(k=>delete loe[k]);Object.assign(loe,data.loe||{});
    Object.keys(leaveByPerson).forEach(k=>delete leaveByPerson[k]);
    Object.assign(leaveByPerson,data.leaveByPerson||{});
    pipeline.length=0;(data.pipeline||[]).forEach(p=>pipeline.push(p));
    if(data.config){[1,2,3,4,5].forEach(l=>{if(data.config[`Target_L${l}`]!==undefined)LT[l]=data.config[`Target_L${l}`];});}
    return true;
  }catch(e){console.warn('Notion load failed:',e.message);return false;}
}

function pct(a,b){return b>0?Math.round(a/b*100):0;}
function firstName(name){const p=name.split(" ");return p[0]==="Grace"&&p.length>1?p[0]+" "+p[1]:p[0];}
function countryFlag(c){const f={"UK":"🇬🇧","France":"🇫🇷","Kenya":"🇰🇪","Hungary":"🇭🇺","South Africa":"🇿🇦","Palestine":"🇵🇸","Canada":"🇨🇦","Italy":"🇮🇹","Uganda":"🇺🇬","Australia":"🇦🇺","Spain":"🇪🇸"};return f[c]||c;}
function stCol(st){return{live:"var(--live)",contracted:"var(--contracted)",BD:"var(--pipeline)"}[st]||"var(--pebble)";}
function sBadge(st){const cls={live:"p-live",contracted:"p-contracted",BD:"p-pipeline"}[st]||"p-gy";const icon={live:"▶️",contracted:"📋",BD:"🔮"}[st]||"";return`<span class="pill ${cls}">${icon} ${st}</span>`;}
function contractBadge(p){const col=CT_COLS[p.contractType]||"#604D64";return`<span class="ct-badge" style="background:${col}20;color:${col};">${CT_LABELS[p.contractType]||p.contractType}</span>`;}
function titleOf(p){return p.customTitle||TITLES[p.level]||"Team Member";}
function leaveDays(person,m,y){
  const mo=m!==undefined?m:curMonth,yr=y!==undefined?y:curYear;
  return(leaveByPerson[person.name]||{})[(yr-2026)*12+mo]||0;
}
function avail(person,m,y){
  const mo=m!==undefined?m:curMonth,yr=y!==undefined?y:curYear;
  let base=AVAIL_DAYS;
  if(person.fte<1){const fteMo=person.fteFromMonth,fteNew=person.fteNew;
    if(fteMo&&fteNew&&(yr>2026||(yr===2026&&mo>=fteMo)))base=Math.round(AVAIL_DAYS*fteNew);
    else base=Math.round(AVAIL_DAYS*person.fte);}
  return Math.max(0,base-leaveDays(person,mo,yr));
}
function targetDays(p,m,y){return Math.round(LT[p.level]*avail(p,m,y));}
function mkey(m,y){return(y-2026)*12+m;}
function mdata(m,y){return allocs[mkey(m,y)]||[];}
function ma(){return mdata(curMonth,curYear);}
function pa(pid,m,y){const data=m!==undefined?mdata(m,y):ma();return data.filter(a=>a.p===pid);}
function totalAlloc(pid,m,y){return pa(pid,m,y).reduce((s,a)=>s+a.d,0);}
function billAlloc(pid,m,y){return pa(pid,m,y).filter(a=>a.st==="live"||a.st==="contracted").reduce((s,a)=>s+a.d,0);}
function getLOE(projId,personName,m,y){
  const mk=m!==undefined?mkey(m,y):mkey(curMonth,curYear);
  return((loe[projId]||{})[personName]||{})[mk]||0;
}
function contractExpiredByMonth(p,m,y){
  if(!p.contractEnd)return false;
  const[ey,em]=p.contractEnd.split('-').map(Number);
  return y>ey||(y===ey&&m>em);
}
function isContractExpiringSoon(p){
  if(!p.contractEnd)return false;
  const[ey,em]=p.contractEnd.split('-').map(Number);
  const diff=(ey-curYear)*12+(em-curMonth);
  return diff>=0&&diff<=2;
}
function sortedPeople(){
  const c=[...people];
  if(sortMode==="alpha")c.sort((a,b)=>a.name.localeCompare(b.name));
  else c.sort((a,b)=>b.level-a.level||(a.name.localeCompare(b.name)));
  return c;
}
function windowMonths(){
  const months=[];
  for(let i=0;i<winSize;i++){let m=curMonth+i,y=curYear;if(m>11){m-=12;y++;}months.push({m,y,label:MONTHS[m]+" "+y,l1:MONTH1[m]});}
  return months;
}
function windowMetrics(months){
  let tAv=0,tBi=0,tFree=0;
  for(const{m,y}of months){
    for(const p of people){
      if(contractExpiredByMonth(p,m,y))continue;
      const av=avail(p,m,y),bill=billAlloc(p.id,m,y),tot=totalAlloc(p.id,m,y);
      tAv+=av;tBi+=bill;tFree+=Math.max(0,av-tot);
    }
  }
  return{tAv,tBi,tFree,tPct:pct(tBi,tAv)};
}
function personStatus(p,m,y){
  const mo=m!==undefined?m:curMonth,yr=y!==undefined?y:curYear;
  const av=avail(p,mo,yr),tot=totalAlloc(p.id,mo,yr);
  if(tot>av)return"over";
  if(Math.max(0,av-tot)===0)return"good"; // fully resourced = no free days
  return"below"; // spare capacity = free days exist
}
function pipelineMonthDemand(m,y){
  let total=0;
  pipeline.forEach(opp=>{
    if(!opp.expectedStart||!opp.durationMonths||!opp.daysRequired)return;
    const start=new Date(opp.expectedStart);
    const startMk=(start.getFullYear()-2026)*12+start.getMonth();
    const endMk=startMk+(opp.durationMonths-1);
    const thisMk=(y-2026)*12+m;
    if(thisMk>=startMk&&thisMk<=endMk)
      total+=(opp.daysRequired/opp.durationMonths)*(opp.probability/100);
  });
  return Math.round(total);
}

function buildImplications(){
  const imps=[];
  const wm=windowMonths();
  const seen=new Set();
  wm.forEach(({m,y,label})=>{
    people.forEach(p=>{
      if(contractExpiredByMonth(p,m,y))return;
      const av=avail(p,m,y),tot=totalAlloc(p.id,m,y),bill=billAlloc(p.id,m,y),tgt=targetDays(p,m,y),leave=leaveDays(p,m,y);
      const overKey=`over-${p.id}-${m}-${y}`;
      const lowKey=`low-${p.id}-${m}-${y}`;
      if(tot>av&&!seen.has(overKey)){seen.add(overKey);imps.push({id:overKey,sev:"red",icon:"🔴",title:`${p.name} over-resourced in ${label}`,detail:`${tot}d allocated vs ${av}d available${leave>0?` (incl. ${leave}d leave)`:""}.`});}
      else if(bill<tgt&&!leave&&!seen.has(lowKey)){seen.add(lowKey);imps.push({id:lowKey,sev:"amber",icon:"🟡",title:`${p.name} has spare capacity in ${label}`,detail:`${bill}d billable vs ${tgt}d target (${Math.round(LT[p.level]*100)}% of ${av}d).`});}
    });
    projects.filter(p=>p.endDate&&p.status==="live").forEach(proj=>{
      const[ey,em]=proj.endDate.split('-').map(Number);
      const diff=(ey-y)*12+(em-m);
      const endKey=`end-${proj.id}`;
      if(diff>=0&&diff<=1&&!seen.has(endKey)){seen.add(endKey);imps.push({id:endKey,sev:"blue",icon:"⏳",title:`${proj.name} ending soon`,detail:`Ends ${proj.endDate}.`});}
    });
  });
  // Contract expiry (once per person)
  people.forEach(p=>{
    if(isContractExpiringSoon(p)){
      const ctKey=`ct-${p.id}`;
      if(!seen.has(ctKey)){seen.add(ctKey);imps.push({id:ctKey,sev:"amber",icon:"⚠️",title:`${p.name} contract expiring`,detail:`${CT_LABELS[p.contractType]} ends ${p.contractEnd}.`});}
    }
  });
  return imps;
}

function buildPersonDonut(person,als,free,av){
  const donutData=als.filter(a=>a.d>0).map(a=>{
    const proj=projects.find(x=>x.id===a.pr)||{name:a.prName||a.pr};
    return{label:proj.name,val:a.d,col:stCol(a.st),isBD:a.st==="BD"};
  });
  const leaveD=leaveDays(person);
  if(leaveD>0)donutData.push({label:"Leave 🌴",val:leaveD,col:"var(--leave)"});
  if(free>0)donutData.push({label:"Free",val:free,col:"var(--free-bar)"});
  else if(free<0)donutData.push({label:"Over-resourced ⚠️",val:Math.abs(free),col:"var(--red)"});
  const tot=donutData.reduce((s,d)=>s+d.val,0);
  if(!tot)return`<div style='padding:20px;text-align:center;font-size:11px;color:var(--text-3);'>No allocations this month.</div>`;
  // Billable = live + contracted only (not BD)
  const billD=als.filter(a=>a.st==="live"||a.st==="contracted").reduce((s,a)=>s+a.d,0);
  const isOver=billD>av;
  const billPct=pct(billD,av);
  const pctCol=isOver?"#C0392B":billPct>=Math.round(LT[person.level]*100)?"#287F66":"#1E1125";
  let ca=-Math.PI/2;const cx=90,cy=90,r=74,ir=40;
  const paths=donutData.map(d=>{
    const angle=(d.val/tot)*2*Math.PI;
    const x1=cx+r*Math.cos(ca),y1=cy+r*Math.sin(ca);ca+=angle;
    const x2=cx+r*Math.cos(ca),y2=cy+r*Math.sin(ca);
    const ix1=cx+ir*Math.cos(ca-angle),iy1=cy+ir*Math.sin(ca-angle);
    const ix2=cx+ir*Math.cos(ca),iy2=cy+ir*Math.sin(ca);
    const lg=angle>Math.PI?1:0;
    return`<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${ix2.toFixed(1)},${iy2.toFixed(1)} A${ir},${ir} 0 ${lg},0 ${ix1.toFixed(1)},${iy1.toFixed(1)} Z" fill="${d.col}" stroke="white" stroke-width="1.5"/>`;
  }).join("");
  // Total % allocation (including BD)
  const totalPct=pct(als.reduce((s,a)=>s+a.d,0),av);
  // Draw 100% marker line inside donut
  const marker100Angle=-Math.PI/2; // Start angle
  const markerAngle=marker100Angle+2*Math.PI; // Full circle = 100%
  // Line at exact 100% position (top of circle)
  const mx1=90+40*Math.cos(-Math.PI/2),my1=90+40*Math.sin(-Math.PI/2);
  const mx2=90+75*Math.cos(-Math.PI/2),my2=90+75*Math.sin(-Math.PI/2);
  const marker100=isOver?`<line x1="${mx1.toFixed(1)}" y1="${my1.toFixed(1)}" x2="${mx2.toFixed(1)}" y2="${my2.toFixed(1)}" stroke="white" stroke-width="3" stroke-linecap="round"/><line x1="${mx1.toFixed(1)}" y1="${my1.toFixed(1)}" x2="${mx2.toFixed(1)}" y2="${my2.toFixed(1)}" stroke="#C0392B" stroke-width="1.5" stroke-linecap="round"/>
    <text x="97" y="18" text-anchor="start" font-family="'Public Sans',sans-serif" font-size="7" fill="#C0392B">100%</text>`:"";
  const svg=`<svg viewBox="0 0 180 180" style="width:160px;height:160px;flex-shrink:0;">${paths}${marker100}` +
    `<text x="90" y="80" text-anchor="middle" font-family="'Crimson Text',serif" font-size="18" font-weight="600" fill="${pctCol}">${totalPct}%</text>` +
    `<text x="90" y="93" text-anchor="middle" font-family="'Public Sans',sans-serif" font-size="8" fill="${pctCol}">allocated</text>` +
    `<text x="90" y="106" text-anchor="middle" font-family="'Public Sans',sans-serif" font-size="8" fill="${isOver?"#C0392B":"#604D64"}">${billPct}% billable</text></svg>`;
  const leg=donutData.map(d=>`<div style="display:flex;align-items:center;gap:5px;font-size:11px;margin-bottom:4px;"><span style="width:8px;height:8px;border-radius:50%;background:${d.col};flex-shrink:0;display:inline-block;${d.isBD?"background-image:repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(0,0,0,0.2) 2px,rgba(0,0,0,0.2) 4px);":""}"></span><span style="flex:1;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${d.label}${d.isBD?" 🔮":""}</span><span style="font-weight:600;color:var(--plum);">${d.val}d</span></div>`).join("");
  const bdNote=als.some(a=>a.st==="BD")?`<div style="font-size:10px;color:var(--text-3);margin-top:4px;padding:4px 6px;background:var(--chalk);border-radius:var(--rsm);">🔮 BD time is not counted as billable</div>`:"";
  return`<div style="display:flex;flex-direction:column;align-items:center;gap:10px;">${svg}<div style="width:100%;">${leg}${bdNote}</div></div>`;
}

// ── OVERVIEW ──
function buildMainDonut(){
  const wm=windowMonths();
  const tots={live:0,contracted:0,BD:0,leave:0};let totAv=0;
  for(const{m,y}of wm){
    const md=mdata(m,y);
    for(const k of['live','contracted','BD'])tots[k]+=md.filter(a=>a.st===k).reduce((s,a)=>s+a.d,0);
    people.filter(p=>!contractExpiredByMonth(p,m,y)).forEach(p=>{totAv+=avail(p,m,y);tots.leave+=leaveDays(p,m,y);});
  }
  const totBill=tots.live+tots.contracted;
  const freeD=Math.max(0,totAv-tots.live-tots.contracted-tots.BD);
  const donutData=[
    {label:"Live",val:tots.live,col:"var(--live)"},
    {label:"Contracted",val:tots.contracted,col:"var(--contracted)"},
    {label:"BD",val:tots.BD,col:"var(--pipeline)",hatch:true},
    {label:"Leave 🌴",val:tots.leave,col:"var(--leave)"},
    {label:"Free",val:freeD,col:"var(--free-bar)"}
  ].filter(d=>d.val>0);
  const dtot=donutData.reduce((s,d)=>s+d.val,0);
  let ca=-Math.PI/2;const cx=100,cy=100,r=88,ir=48;
  const paths=donutData.map(d=>{
    const angle=(d.val/dtot)*2*Math.PI;
    const x1=cx+r*Math.cos(ca),y1=cy+r*Math.sin(ca);ca+=angle;
    const x2=cx+r*Math.cos(ca),y2=cy+r*Math.sin(ca);
    const ix1=cx+ir*Math.cos(ca-angle),iy1=cy+ir*Math.sin(ca-angle);
    const ix2=cx+ir*Math.cos(ca),iy2=cy+ir*Math.sin(ca);
    const lg=angle>Math.PI?1:0;
    return`<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${ix2.toFixed(1)},${iy2.toFixed(1)} A${ir},${ir} 0 ${lg},0 ${ix1.toFixed(1)},${iy1.toFixed(1)} Z" fill="${d.col}" stroke="white" stroke-width="2"/>`;
  }).join("");
  const bPct=pct(totBill,totAv);
  // Hatch pattern for pipeline
  const defs=`<defs><pattern id="hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="8" stroke="rgba(255,255,255,0.55)" stroke-width="4"/></pattern></defs>`;
  const pipelineIdx=donutData.findIndex(d=>d.hatch);
  let hatchOverlay='';
  if(pipelineIdx>=0){
    // Re-draw pipeline segment with hatch overlay
    let ca2=-Math.PI/2;
    for(let i=0;i<donutData.length;i++){
      const d=donutData[i];const angle=(d.val/dtot)*2*Math.PI;
      if(i===pipelineIdx){
        const x1=cx+r*Math.cos(ca2),y1=cy+r*Math.sin(ca2);const ca3=ca2+angle;
        const x2=cx+r*Math.cos(ca3),y2=cy+r*Math.sin(ca3);
        const ix1=cx+ir*Math.cos(ca2),iy1=cy+ir*Math.sin(ca2);
        const ix2=cx+ir*Math.cos(ca3),iy2=cy+ir*Math.sin(ca3);
        const lg=angle>Math.PI?1:0;
        hatchOverlay=`<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${ix2.toFixed(1)},${iy2.toFixed(1)} A${ir},${ir} 0 ${lg},0 ${ix1.toFixed(1)},${iy1.toFixed(1)} Z" fill="url(#hatch)"/>`;
      }
      ca2+=angle;
    }
  }
  const svg=`<svg viewBox="0 0 200 200" style="width:200px;height:200px;">${defs}${paths}${hatchOverlay}<text x="100" y="94" text-anchor="middle" font-family="'Crimson Text',serif" font-size="26" font-weight="600" fill="#1E1125">${bPct}%</text><text x="100" y="112" text-anchor="middle" font-family="'Public Sans',sans-serif" font-size="11" fill="#604D64">billable</text></svg>`;
  const leg=donutData.map(d=>`<div style="display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:5px;"><span style="width:10px;height:10px;border-radius:50%;background:${d.col};flex-shrink:0;display:inline-block;${d.hatch?"background-image:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(255,255,255,0.6) 3px,rgba(255,255,255,0.6) 6px);":""}border:1px solid rgba(0,0,0,0.08);"></span><span style="flex:1;color:var(--text-2);">${d.label}</span><span style="font-weight:600;color:var(--plum);">${d.val}d</span><span style="font-size:10px;color:var(--text-3);">${pct(d.val,totAv)}%</span></div>`).join("");
  return`<div style="display:flex;flex-direction:column;align-items:center;gap:12px;">${svg}<div style="width:100%;">${leg}</div></div>`;
}

function buildStrengthHeatmap(){
  const teamSize=people.length||1;
  const ssStrength=SS.map(s=>{
    const experts=people.filter(p=>(p.skills||{})[s.id]>=3).length;
    const capable=people.filter(p=>(p.skills||{})[s.id]===2).length;
    const interested=people.filter(p=>(p.skills||{})[s.id]===1).length;
    const score=experts*3+capable*2+interested;
    return{...s,experts,capable,interested,total:experts+capable+interested,score};
  }).sort((a,b)=>a.score-b.score);
  const maxScore=Math.max(...ssStrength.map(s=>s.score),1);
  const rows=ssStrength.map(s=>{
    const isGap=s.capable+s.experts===0;
    const isThin=s.capable+s.experts===1;
    const col=isGap?"var(--red)":isThin?"var(--naranja)":"var(--clover)";
    const bg=isGap?"#FDE8E6":isThin?"#FEF3E2":"#E6F4F0";
    const barW=Math.round((s.score/maxScore)*100);
    const label=isGap?"Gap":isThin?"Thin":"OK";
    return`<div class="strength-row">
      <div class="strength-label" title="${s.l}">${s.l}</div>
      <div style="flex:1;height:8px;background:var(--pebble);border-radius:3px;overflow:hidden;">
        <div style="width:${barW}%;height:100%;background:${col};border-radius:3px;"></div>
      </div>
      <div style="min-width:55px;text-align:right;font-size:10px;font-weight:600;color:${col};">${label} · ${s.capable+s.experts}</div>
    </div>`;
  }).join("");
  return`<div style="font-size:9px;color:var(--text-3);margin-bottom:6px;">Sorted by coverage · capable+ only · <span style="color:var(--clover);">●</span> strong <span style="color:var(--naranja);">●</span> thin <span style="color:var(--red);">●</span> gap</div>${rows}`;
}


function buildContractTimeline(){
  const lookAhead=winSize===1?3:winSize===3?6:winSize===6?9:12;
  const endingSoon=people.filter(p=>{
    if(!p.contractEnd)return false;
    const[ey,em]=p.contractEnd.split('-').map(Number);
    const monthsAway=(ey-curYear)*12+(em-curMonth);
    return monthsAway>=0&&monthsAway<lookAhead;
  }).sort((a,b)=>{
    const[ay,am]=a.contractEnd.split('-').map(Number);
    const[by,bm]=b.contractEnd.split('-').map(Number);
    return (ay-by)*12+(am-bm);
  });

  if(!endingSoon.length){
    return`<div style="padding:16px 0;text-align:center;font-size:11px;color:var(--text-3);">No contracts ending in the next ${lookAhead} months 🎉</div>`;
  }

  // Build a simple timeline bar
  const rows=endingSoon.map(p=>{
    const[ey,em]=p.contractEnd.split('-').map(Number);
    const monthsAway=(ey-curYear)*12+(em-curMonth);
    const urgency=monthsAway<=1?"var(--red)":monthsAway<=2?"var(--naranja)":"var(--clover)";
    const barW=Math.round(((lookAhead-monthsAway)/lookAhead)*100);
    const label=monthsAway===0?"this month":monthsAway===1?"next month":`in ${monthsAway} months`;
    return`<div style="margin-bottom:8px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">
        <div class="pgcard-av" style="background:${p.col};color:${p.tc};width:22px;height:22px;font-size:8px;flex-shrink:0;">${p.initials}</div>
        <div style="flex:1;min-width:0;">
          <span style="font-size:11px;font-weight:600;color:var(--plum);">${p.name}</span>
          <span style="font-size:10px;color:var(--text-3);margin-left:6px;">${CT_LABELS[p.contractType]||p.contractType}</span>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <span style="font-size:11px;font-weight:600;color:${urgency};">${p.contractEnd}</span>
          <span style="font-size:10px;color:${urgency};margin-left:4px;">${label}</span>
        </div>
      </div>
      <div style="height:4px;background:var(--pebble);border-radius:2px;overflow:hidden;">
        <div style="width:${100-barW}%;height:100%;background:${urgency};border-radius:2px;"></div>
      </div>
    </div>`;
  }).join("");

  return`<div style="font-size:9px;color:var(--text-3);margin-bottom:8px;">Next ${lookAhead} months · 🔴 &lt;1mo · 🟡 &lt;2mo · 🟢 3mo+</div>${rows}`;
}

// ── PEOPLE ──
function renderPeople(){
  const legend=`<div class="tab-legend">
    <span class="filter-label">Key:</span>
    <div class="legend-item"><span style="display:inline-block;width:12px;height:3px;background:var(--clover);border-radius:1px;margin-top:-1px;"></span>Fully resourced</div>

    <div class="legend-item"><span class="legend-dot" style="background:var(--contracted);"></span>Contracted</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--pipeline);background-image:repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,0.5) 2px,rgba(255,255,255,0.5) 4px);"></span>Pipeline</div>

  const projBtns=projects.filter(p=>p.id!=="INT"&&p.status!=="BD").map(p=>`<button class="sort-btn ${filterProjects.has(p.id)?"active":""}" style="font-size:10px;padding:2px 8px;margin:1px;" onclick="toggleFilterProject('${p.id}')">${p.name}</button>`).join("");
  const bdProjBtns=projects.filter(p=>p.status==="BD").map(p=>`<button class="sort-btn ${filterProjects.has(p.id)?"active":""}" style="font-size:10px;padding:2px 8px;margin:1px;border-color:var(--pipeline);" onclick="toggleFilterProject('${p.id}')">${p.name}</button>`).join("");
  const filterBar=`<div class="filter-bar">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
      <span class="filter-label">Sort:</span>
      <button class="sort-btn ${sortMode==="seniority"?"active":""}" onclick="setSort('seniority')">Seniority</button>
      <button class="sort-btn ${sortMode==="alpha"?"active":""}" onclick="setSort('alpha')">A–Z</button>
      <span class="filter-label" style="margin-left:8px;">Pillar:</span>
      <button class="sort-btn ${!filterPillar?"active":""}" onclick="setFilterPillar(null)">All</button>
      <button class="sort-btn ${filterPillar==="F&P"?"active":""}" onclick="setFilterPillar('F&P')">F&amp;P</button>
      <button class="sort-btn ${filterPillar==="IL"?"active":""}" onclick="setFilterPillar('IL')">IL</button>
      <span class="filter-label" style="margin-left:8px;">Status:</span>
      <button class="sort-btn ${!filterStatus?"active":""}" onclick="setFilterStatus(null)">All</button>
      <button class="sort-btn ${filterStatus==="over"?"active":""}" onclick="setFilterStatus('over')">⚠️ Over-resourced</button>
      <button class="sort-btn ${filterStatus==="below"?"active":""}" onclick="setFilterStatus('below')">💚 Spare capacity</button>
      <button class="sort-btn ${filterStatus==="BD"?"active":""}" onclick="setFilterStatus('BD')">🔮 BD</button>
      <button class="sort-btn ${filterStatus==="good"?"active":""}" onclick="setFilterStatus('good')">✓ Fully resourced</button>
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding-top:8px;border-top:1px solid var(--border);margin-top:2px;">
      <span class="filter-label">Project:</span>${projBtns}
      ${filterProjects.size>0?`<button class="sort-btn" onclick="clearFilterProjects()" style="color:var(--red);">✕ clear</button>`:""}
    </div>
    ${bdProjBtns?`<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);">
      <span class="filter-label">BD:</span>${bdProjBtns}

  if(winSize>1){document.getElementById("view").innerHTML=legend+filterBar+renderPeopleMulti(windowMonths());return;}

  let dp=sortedPeople().filter(p=>!contractExpiredByMonth(p,curMonth,curYear));
  if(filterProjects.size>0){const onP=new Set(ma().filter(a=>filterProjects.has(a.pr)).map(a=>a.p));dp=dp.filter(p=>onP.has(p.id));}
  if(filterPillar)dp=dp.filter(p=>p.pillar===filterPillar||p.pillar==="F&P+IL");
  if(filterStatus==="BD")dp=dp.filter(p=>pa(p.id).some(a=>a.st==="BD"));
  else if(filterStatus)dp=dp.filter(p=>personStatus(p)===filterStatus);

  const cards=dp.map(person=>{
    const av=avail(person),als=pa(person.id),total=als.reduce((s,a)=>s+a.d,0);
    const bill=billAlloc(person.id),free=Math.max(0,av-total);
    const tgt=targetDays(person),tPct2=Math.round(LT[person.level]*100);
    const leaveD=leaveDays(person),isExp=expanded.has(person.id),panel=expandedPanels[person.id]||"alloc";
    const riskFlag=isContractExpiringSoon(person),isOver=total>av;
    const cardStatus=isOver?"over":bill>=tgt?"good":"below";
    const _pillars=person.pillar==="F&P+IL"?["F&P","IL"]:[person.pillar];
    const pBadge=_pillars.map(p=>`<span class="pill ${p==="IL"?"p-teal":"p-pl"}" style="font-size:9px;">${p==="F&P"?"F&amp;P":p}</span>`).join(" ");

    // Allocation bar segments
    const segs=als.map(a=>`<div style="width:${Math.min(pct(a.d,av),100)}%;background:${stCol(a.st)};height:100%;flex-shrink:0;${a.st==="BD"?"background-image:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(255,255,255,0.45) 3px,rgba(255,255,255,0.45) 6px);":""}"></div>`).join("");
    const leaveW=pct(leaveD,AVAIL_DAYS);
    const leaveSeg=leaveD>0?`<div style="width:${leaveW}%;background:var(--leave);height:100%;flex-shrink:0;"></div>`:"";
    const freeW=pct(free,av);
    const freeSeg=free>0?`<div style="width:${freeW}%;background:var(--free-bar);height:100%;flex-shrink:0;"></div>`:"";

    // Status indicator in meta
    let statusEl="";
    if(isOver)statusEl=`<span class="over-bubble">⚠️ ${total-av}d over</span>`;
    else if(free>0)statusEl=`<span class="free-bubble">${free}d free</span>`;
    else statusEl=`<span style="font-size:10px;color:var(--clover);font-weight:600;">✓ Fully resourced</span>`;

    // Allocation rows for expand panel
    const allocRows=als.map(a=>{
      const proj=projects.find(x=>x.id===a.pr)||{name:a.prName||a.pr};
      const loeDays=getLOE(a.pr,person.name);
      const diff=loeDays>0?a.d-loeDays:null;
      const gapText=loeDays>0?(diff===0?"✓":diff>0?`+${diff}d over`:`${diff}d under`):"no LOE";
      const gapCol=loeDays===0?"color:var(--text-3)":diff===0?"color:var(--clover)":Math.abs(diff)===1?"color:var(--naranja)":"color:var(--red)";
      return`<tr><td style="display:flex;align-items:center;gap:5px;"><span style="width:7px;height:7px;border-radius:50%;background:${stCol(a.st)};flex-shrink:0;"></span>${proj.name}${a.st==="BD"?" 🔮":""}</td><td>${sBadge(a.st)}</td><td style="text-align:right;font-weight:600;">${a.d}d</td><td style="font-size:10px;${gapCol}">${gapText}</td></tr>`;
    }).join("");
    const allocPanel=`<table class="dt"><thead><tr><th>Project</th><th>Status</th><th style="text-align:right">Days</th><th>vs LOE</th></tr></thead><tbody>${allocRows}
      ${leaveD>0?`<tr><td style="display:flex;align-items:center;gap:5px;"><span style="width:7px;height:7px;border-radius:50%;background:var(--leave);flex-shrink:0;"></span>Leave 🌴</td><td></td><td style="text-align:right;font-weight:600;color:var(--leave);">${leaveD}d</td><td></td></tr>`:""}
      ${free>0?`<tr><td style="display:flex;align-items:center;gap:5px;"><span style="width:7px;height:7px;border-radius:50%;background:var(--free-bar);flex-shrink:0;"></span>Free</td><td></td><td style="text-align:right;font-weight:600;color:var(--clover);">${free}d</td><td></td></tr>`:""}
    </tbody></table>`;

    const leaveCallout=leaveD>0?`<div class="callout" style="background:#FDE8E6;color:#8A3020;border-left:3px solid var(--leave);">🌴 ${leaveD}d leave — available days: ${av}d.</div>`:"";
    const tgtCallout=isOver?`<div class="callout co-risk">⚠️ Over-resourced by ${total-av}d. Check allocations.</div>`:free===0?`<div class="callout co-g">✓ Fully resourced — all ${av}d allocated. Billable target: ${tgt}d (${tPct2}%).</div>`:`<div class="callout co-a">💚 ${free}d spare capacity this month. Billable target: ${tgt}d (${tPct2}% of ${av}d).</div>`;
    const riskCallout=riskFlag?`<div class="callout co-risk">⚠️ ${CT_LABELS[person.contractType]} ends ${person.contractEnd}.</div>`:"";
    const contractPanel=`<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;">${countryFlag(person.country)} <span style="font-size:11px;">${person.country}</span>${contractBadge(person)}</div>
    <div class="fte-grid">
      <div class="ftem"><div class="ftem-l">Billable days</div><div class="ftem-v cg">${bill}d</div></div>
      <div class="ftem"><div class="ftem-l">Target (L${person.level}, ${tPct2}%)</div><div class="ftem-v">${tgt}d of ${av}d</div></div>
      <div class="ftem"><div class="ftem-l">Available${leaveD>0?" (after leave)":""}</div><div class="ftem-v">${av}d${leaveD>0?` <span style="color:var(--leave);font-size:10px;">−${leaveD}d 🌴</span>`:""}</div></div>
      <div class="ftem"><div class="ftem-l">${isOver?"Over by":"Free days"}</div><div class="ftem-v ${isOver?"cr":free>0?"cg":"ca"}">${isOver?total-av+"d ⚠️":free+"d"}</div></div>
    </div>${leaveCallout}${tgtCallout}${riskCallout}`;

    return`<div class="pgcard ${cardStatus}" onclick="togglePerson(${person.id})">
  <div class="pgcard-head">
    <div class="pgcard-av" style="background:${person.col};color:${person.tc}">
      ${isOver?`<span style="position:absolute;top:-3px;right:-3px;background:var(--red);color:white;border-radius:50%;width:14px;height:14px;display:flex;align-items:center;justify-content:center;font-size:8px;border:1.5px solid white;">!</span>`:""}
      ${person.initials}
    </div>
    <div class="pgcard-info">
      <div class="pgcard-name">${person.name} ${pBadge}${riskFlag?`<span class="pill p-risk" style="font-size:9px;">⚠️ exp</span>`:""}${leaveD>0?" 🌴":""}</div>
      <div class="pgcard-role">${titleOf(person)} · L${person.level} · ${countryFlag(person.country)} ${TZ[person.country]||""}</div>
    </div>
    <div class="pgcard-meta">
      <div style="text-align:right;">
        <div style="font-family:var(--fh);font-size:18px;font-weight:600;color:${isOver?"var(--red)":bill>=tgt?"var(--clover)":"var(--naranja)"};">${total}d</div>
        <div style="font-size:9px;color:var(--text-3);">${bill}d billable</div>
      </div>
      <span style="font-size:12px;color:var(--text-3);">${isExp?"▲":"▼"}</span>
    </div>
  </div>
  <div class="pgcard-bar">
    <div class="pgcard-bar-fill" style="display:flex;height:100%;">${segs}${leaveSeg}${freeSeg}</div>
    <div class="pgcard-bar-target" style="left:${tPct2}%;"></div>
  </div>
  <div class="pgcard-stats">
    <span>${total}/${av}d · ${bill}d billable · target ${tPct2}%</span>
    ${statusEl}
  </div>
  <div class="pgcard-expand ${isExp?"open":""}">
    <div class="pd-tabs" onclick="event.stopPropagation()">
      <button class="pd-tab ${panel==="alloc"?"active":""}" onclick="switchPanel(${person.id},'alloc')">📋 Allocation</button>
      <button class="pd-tab ${panel==="contract"?"active":""}" onclick="switchPanel(${person.id},'contract')">📄 Contract</button>
      <button class="pd-tab ${panel==="donut"?"active":""}" onclick="switchPanel(${person.id},'donut')">🍩 Chart</button>
    </div>
    <div class="pd-panel ${panel==="alloc"?"active":""}" onclick="event.stopPropagation()">${allocPanel}</div>
    <div class="pd-panel ${panel==="contract"?"active":""}" onclick="event.stopPropagation()">${contractPanel}</div>
    <div class="pd-panel ${panel==="donut"?"active":""}" onclick="event.stopPropagation()">${buildPersonDonut(person,als,free,av)}</div>
  </div>
</div>`;
  }).join("");

  document.getElementById("view").innerHTML=legend+filterBar+`<div class="card-grid">${cards||"<div style='padding:20px;text-align:center;color:var(--text-3);'>No people match filters.</div>"}</div>`;
}

function renderPeopleMulti(wm){
  let dp=sortedPeople().filter(p=>!contractExpiredByMonth(p,wm[0].m,wm[0].y));
  if(filterPillar)dp=dp.filter(p=>p.pillar===filterPillar||p.pillar==="F&P+IL");

  const barW=Math.max(10,Math.floor(220/wm.length)-3);
  const maxH=44;

  const cards=dp.map(person=>{
    const monthData=wm.map(({m,y})=>{
      if(contractExpiredByMonth(person,m,y))return null;
      const av=avail(person,m,y),bill=billAlloc(person.id,m,y);
      const tgt=targetDays(person,m,y),leaveD=leaveDays(person,m,y);
      const als=pa(person.id,m,y);
      const live=als.filter(a=>a.st==="live").reduce((s,a)=>s+a.d,0);
      const contracted=als.filter(a=>a.st==="contracted").reduce((s,a)=>s+a.d,0);
      const pipeline2=als.filter(a=>a.st==="BD").reduce((s,a)=>s+a.d,0);
      const free=Math.max(0,av-live-contracted-pipeline2);
      return{av,bill,tgt,leaveD,live,contracted,pipeline2,free,m,y};
    });

    const validData=monthData.filter(Boolean);
    const avgPct=validData.length?Math.round(validData.reduce((s,d)=>s+pct(d.bill,d.av),0)/validData.length):0;
    const tgtPct=Math.round(LT[person.level]*100);
    const avgCol=avgPct>=tgtPct?"var(--clover)":avgPct>=tgtPct*0.85?"var(--naranja)":"var(--red)";

    // Stacked bars SVG
    const svgW=wm.length*(barW+3);
    const bars=monthData.map((d,i)=>{
      const x=i*(barW+3);
      if(!d)return`<rect x="${x}" y="0" width="${barW}" height="${maxH}" fill="var(--pebble)" rx="2"/>`;
      const liveH=Math.round((d.live/d.av)*maxH);
      const contractedH=Math.round((d.contracted/d.av)*maxH);
      const pipeH=Math.round((d.pipeline2/d.av)*maxH);
      const leaveH=Math.round((d.leaveD/AVAIL_DAYS)*maxH);
      const freeH=Math.max(0,maxH-liveH-contractedH-pipeH-leaveH);
      let yOff=maxH;
      const rects=[];
      // Draw bottom to top: live (bottom), contracted, pipeline, leave, free (top)
      if(liveH>0){yOff-=liveH;rects.push(`<rect x="${x}" y="${yOff}" width="${barW}" height="${liveH}" fill="var(--live)" rx="1"/>`);}
      if(contractedH>0){yOff-=contractedH;rects.push(`<rect x="${x}" y="${yOff}" width="${barW}" height="${contractedH}" fill="var(--contracted)" rx="1"/>`);}
      if(pipeH>0){yOff-=pipeH;rects.push(`<rect x="${x}" y="${yOff}" width="${barW}" height="${pipeH}" fill="var(--pipeline)" rx="1"/>`);}
      if(leaveH>0){yOff-=leaveH;rects.push(`<rect x="${x}" y="${yOff}" width="${barW}" height="${leaveH}" fill="var(--leave)" rx="1"/>`);}
      if(freeH>0){yOff-=freeH;rects.push(`<rect x="${x}" y="${yOff}" width="${barW}" height="${freeH}" fill="var(--free-bar)" rx="1"/>`);}
      const tgtY=maxH-Math.round((d.tgt/d.av)*maxH);
      rects.push(`<line x1="${x}" y1="${tgtY}" x2="${x+barW}" y2="${tgtY}" stroke="var(--plum)" stroke-width="1.5"/>`);
      return`<g style="cursor:pointer;" onclick="jumpToMonth(${d.m},${d.y})" title="${MONTHS[d.m]} ${d.y}: ${d.bill}d billable">${rects.join("")}</g>`;
    }).join("");
    const labels=wm.map(({m,l1},i)=>`<text x="${i*(barW+3)+barW/2}" y="${maxH+12}" text-anchor="middle" font-size="8" fill="#8A7A8E">${l1}</text>`).join("");
    const svg=`<svg viewBox="0 0 ${svgW} ${maxH+16}" style="width:100%;height:${maxH+16}px;">${bars}${labels}</svg>`;

    const _pillars=person.pillar==="F&P+IL"?["F&P","IL"]:[person.pillar];
    const pBadge=_pillars.map(p=>`<span class="pill ${p==="IL"?"p-teal":"p-pl"}" style="font-size:8px;">${p==="F&P"?"F&amp;P":p}</span>`).join(" ");

    return`<div class="spark-card" onclick="showPersonDonut(${person.id})">
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:8px;">
        <div class="pgcard-av" style="background:${person.col};color:${person.tc};width:26px;height:26px;font-size:8px;flex-shrink:0;">${person.initials}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-family:var(--fh);font-size:13px;font-weight:600;color:var(--plum);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${person.name} ${pBadge}</div>
          <div style="font-size:10px;color:var(--text-3);">${titleOf(person)} · L${person.level}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-family:var(--fh);font-size:16px;font-weight:600;color:${avgCol};">${avgPct}%</div>
          <div style="font-size:9px;color:var(--text-3);">avg billable</div>
        </div>
      </div>
      ${svg}
      <div style="font-size:9px;color:var(--text-3);margin-top:2px;text-align:right;">Click bar to jump to month · click card for allocation chart</div>
    </div>`;
  }).join("");

  // Small legend for sparklines
  const sparkLegend=`<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px;font-size:10px;color:var(--text-3);align-items:center;">
    <span style="font-weight:700;text-transform:uppercase;letter-spacing:0.04em;">Key:</span>
    <div style="display:flex;align-items:center;gap:3px;"><span style="width:10px;height:10px;border-radius:2px;background:var(--live);display:inline-block;"></span>Live</div>
    <div style="display:flex;align-items:center;gap:3px;"><span style="width:10px;height:10px;border-radius:2px;background:var(--pipeline);display:inline-block;"></span>Pipeline</div>
    <div style="display:flex;align-items:center;gap:3px;"><span style="width:10px;height:10px;border-radius:2px;background:var(--leave);display:inline-block;"></span>Leave</div>
    <div style="display:flex;align-items:center;gap:3px;"><span style="width:10px;height:10px;border-radius:2px;background:var(--free-bar);display:inline-block;"></span>Free</div>
    <div style="display:flex;align-items:center;gap:3px;"><div style="width:14px;height:2px;background:var(--plum);"></div>Target</div>
  </div>`;

  return sparkLegend+`<div class="sparkline-grid">${cards||"<div style='padding:20px;text-align:center;color:var(--text-3);'>No people match filters.</div>"}</div>`;
}

// ── PROJECTS ──
function renderProjects(){
  const legend=`<div class="tab-legend">
    <span class="filter-label">Key:</span>
    <div class="legend-item"><span style="width:10px;height:10px;border-radius:2px;background:var(--border-strong);display:inline-block;opacity:0.5;"></span>LOE budget</div>
    <div class="legend-item"><span style="width:10px;height:10px;border-radius:2px;background:var(--clover);display:inline-block;"></span>On budget</div>
    <div class="legend-item"><span style="width:10px;height:10px;border-radius:2px;background:var(--naranja);display:inline-block;"></span>1–3d off</div>
    <div class="legend-item"><span style="width:10px;height:10px;border-radius:2px;background:var(--red);display:inline-block;"></span>Over LOE</div>
    <div class="legend-item"><span style="width:10px;height:10px;border-radius:2px;background:var(--chalk);display:inline-block;border:1px solid var(--border);"></span>Under LOE</div>
    <div style="font-size:10px;color:var(--text-3);font-style:italic;margin-left:auto;">Does not reconcile vs budget</div>
  </div>`;

  if(winSize>1){document.getElementById("view").innerHTML=legend+renderProjectsMulti(windowMonths());return;}

  const _allClients=[...new Set(projects.filter(p=>p.id!=="INT"&&p.client).map(p=>p.client))].sort();
  const _actPpl=people.filter(p=>!contractExpiredByMonth(p,curMonth,curYear));
  const clientBtns=_allClients.map(c=>`<button class="sort-btn ${filterClients.has(c)?"active":""}" style="font-size:10px;padding:2px 8px;margin:1px;" onclick="toggleFilterClient('${c}')">${c}</button>`).join("");
  const personBtns=_actPpl.map(p=>`<button class="sort-btn ${filterPersons.has(p.id)?"active":""}" style="font-size:10px;padding:2px 8px;margin:1px;" onclick="toggleFilterPerson(${p.id})">${firstName(p.name)}</button>`).join("");
  const filterBar=`<div class="filter-bar">
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px;"><span class="filter-label">Client:</span>${clientBtns}${filterClients.size>0?`<button class="sort-btn" onclick="clearFilterClients()" style="color:var(--red);">✕</button>`:""}</div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px;"><span class="filter-label">Person:</span>${personBtns}${filterPersons.size>0?`<button class="sort-btn" onclick="clearFilterPersons()" style="color:var(--red);">✕</button>`:""}</div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;"><span class="filter-label">Status:</span>
      <button class="sort-btn ${!filterStatus?"active":""}" onclick="setFilterStatus(null)">All</button>
      <button class="sort-btn ${filterStatus==="live"?"active":""}" onclick="setFilterStatus('live')">▶️ Live</button>
      <button class="sort-btn ${filterStatus==="contracted"?"active":""}" onclick="setFilterStatus('contracted')">📋 Contracted</button>
      <button class="sort-btn ${filterStatus==="BD"?"active":""}" onclick="setFilterStatus('BD')">🔮 BD</button>
    </div>
  </div>`;

  const html2=projects.filter(p=>p.id!=="INT").filter(proj=>!filterStatus||proj.status===filterStatus).map(proj=>{
    let pA=mdata(curMonth,curYear).filter(a=>a.pr===proj.id);
    if(filterPersons.size>0)pA=pA.filter(a=>filterPersons.has(a.p));
    if(filterClients.size>0&&!filterClients.has(proj.client))return"";
    if(!pA.length&&(filterPersons.size>0||filterClients.size>0))return"";
    const days=pA.reduce((s,a)=>s+a.d,0);
    const isOpen=expanded.has("proj-"+proj.id);
    let loeTot=0;
    const personLoeMap={},personAllocMap={};
    const projLoe=loe[proj.id]||{};
    Object.entries(projLoe).forEach(([pName,bm])=>{const d=bm[mkey(curMonth,curYear)]||0;loeTot+=d;personLoeMap[pName]=(personLoeMap[pName]||0)+d;});
    pA.forEach(a=>{const per=people.find(x=>x.id===a.p);if(!per)return;personAllocMap[per.name]=(personAllocMap[per.name]||0)+a.d;});
    const hasLOE=loeTot>0;
    const maxD2=Math.max(loeTot,days,1);
    const diff=days-loeTot;
    const barCol=hasLOE?(Math.abs(diff)<=1?"var(--clover)":Math.abs(diff)<=3?"var(--naranja)":"var(--red)"):"var(--border-strong)";

    const loeRows=Object.keys({...personLoeMap,...personAllocMap}).map(pName=>{
      const loeDays=personLoeMap[pName]||0,allocDays=personAllocMap[pName]||0;
      const diff2=allocDays-loeDays,maxD3=Math.max(loeDays,allocDays,1);
      const actualColor=loeDays===0?"var(--plum)":diff2===0?"var(--clover)":diff2>0?(Math.abs(diff2)<=1?"var(--naranja)":"var(--red)"):"var(--plum-light)";
      const gapText=loeDays===0?"no LOE":diff2===0?"✓":diff2>0?`+${diff2}d ▲`:`${diff2}d`;
      const gapCol=loeDays===0?"color:var(--text-3)":diff2===0?"color:var(--clover)":diff2>0?(Math.abs(diff2)<=1?"color:var(--naranja)":"color:var(--red)"):"color:var(--text-3)";
      return`<div class="proj-loe-row">
        <div class="proj-loe-name">${firstName(pName)}</div>
        <div class="proj-loe-track">
          ${loeDays>0?`<div class="proj-loe-budget" style="width:${pct(loeDays,maxD3)}%"></div>`:""}
          <div class="proj-loe-actual" style="width:${Math.min(100,pct(allocDays,maxD3))}%;background:${actualColor};"></div>
          ${allocDays>loeDays&&loeDays>0?`<div class="proj-loe-overflow" style="left:${pct(loeDays,maxD3)}%;"></div>`:""}
        </div>
        <div class="proj-loe-nums" style="${gapCol};">${allocDays}d${loeDays>0?`/${loeDays}d`:""} <span style="font-size:9px;">${gapText}</span></div>
      </div>`;
    }).join("");

    const clickablePeople=Object.keys({...personLoeMap,...personAllocMap}).map(pName=>{
      const per=people.find(x=>x.name===pName);if(!per)return'';
      return`<span class="pchip" style="background:${per.col};color:${per.tc};cursor:pointer;" onclick="event.stopPropagation();showPersonDonut(${per.id})" title="${per.name}">${per.initials}</span>`;
    }).join('');;

    const lTag=proj.lift?`<span class="tag t-l${proj.lift==="high"?"h":proj.lift==="medium"?"m":"l"}">${proj.lift} lift</span>`:"";
    const statusIcon={live:"▶️",contracted:"📋",BD:"🔮"}[proj.status]||"";

    return`<div class="pjgcard" onclick="toggleProjExpand('proj-${proj.id}')">
  <div class="pjgcard-head">
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px;">
      <span>${statusIcon}</span>
      <span style="font-family:var(--fh);font-weight:600;font-size:15px;color:var(--plum);">${proj.name}</span>
      ${sBadge(proj.status)}${lTag}
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
      <div style="font-size:11px;color:var(--text-3);">${proj.client}${proj.endDate?` · ⏳ ${proj.endDate}`:""}</div>
      <div style="text-align:right;"><div style="font-family:var(--fh);font-size:18px;font-weight:600;color:var(--plum);">${days}d</div>${hasLOE?`<div style="font-size:10px;color:var(--text-3);">LOE: ${loeTot}d</div>`:""}</div>
    </div>
    <div style="height:7px;background:var(--pebble);border-radius:3px;overflow:hidden;position:relative;margin-bottom:3px;">
      ${hasLOE?`<div style="position:absolute;top:0;left:0;width:${pct(loeTot,maxD2)}%;height:100%;background:var(--border-strong);opacity:0.4;"></div>`:""}
      <div style="position:absolute;top:0;left:0;width:${Math.min(100,pct(days,maxD2))}%;height:100%;background:${barCol};opacity:0.85;"></div>
    </div>
    ${hasLOE?`<div style="font-size:10px;color:${barCol};font-weight:500;">${days}d / ${loeTot}d LOE${diff>0?" · +"+diff+"d over":diff<0?" · "+diff+"d under":" · on budget"}</div>`:`<div style="font-size:10px;color:var(--text-3);">${days}d · no LOE data</div>`}
  </div>
  <div class="pjgcard-expand ${isOpen?"open":""}" onclick="event.stopPropagation()">
    ${Object.keys({...personLoeMap,...personAllocMap}).length>0?`
      <div style="margin-bottom:8px;"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--text-3);margin-bottom:4px;">Team — click for allocation chart</div>${clickablePeople}</div>
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--text-3);margin-bottom:6px;">LOE vs allocated</div>${loeRows}`
      :`<div style="font-size:11px;color:var(--text-3);">No budget data yet.</div>`}
  </div>
</div>`;
  }).filter(Boolean).join("");

  document.getElementById("view").innerHTML=legend+filterBar+`<div class="pjcard-grid">${html2||"<div style='padding:20px;text-align:center;color:var(--text-3);'>No projects match filter.</div>"}</div>`;
}

function renderProjectsMulti(wm){
  const visProjects=projects.filter(p=>p.id!=="INT").filter(proj=>
    wm.some(({m,y})=>mdata(m,y).some(a=>a.pr===proj.id))||
    Object.keys(loe[proj.id]||{}).length>0
  );
  const thCols=wm.map(({label,l1})=>`<th style="text-align:center;min-width:72px;white-space:nowrap;font-size:11px;">${label}</th>`).join("");
  const rows=visProjects.map(proj=>{
    const statusIcon={live:"▶️",contracted:"📋",BD:"🔮"}[proj.status]||"";
    const cols=wm.map(({m,y})=>{
      const pA=mdata(m,y).filter(a=>a.pr===proj.id);
      const days=pA.reduce((s,a)=>s+a.d,0);
      const projLoe=loe[proj.id]||{};
      let loeDays=0;Object.values(projLoe).forEach(bm=>{loeDays+=(bm[mkey(m,y)]||0);});
      if(!days&&!loeDays)return`<td></td>`;
      const diff=days-loeDays;
      // Colour coding: over=red, on budget=green, under=chalk (muted), no LOE=plum
      let bg,col,label;
      if(loeDays===0){bg="var(--chalk)";col="var(--plum)";label="";}
      else if(Math.abs(diff)<=1){bg="#E6F4F0";col="var(--clover)";label="✓";}
      else if(diff>0&&diff<=3){bg="#FEF3E2";col="var(--naranja)";label=`+${diff}d ▲`;}
      else if(diff>3){bg="#FDE8E6";col="var(--red)";label=`+${diff}d ▲`;}
      else{bg="var(--chalk)";col="var(--text-3)";label=`${diff}d`;}// under LOE - muted
      return`<td style="padding:2px;">
        <div class="proj-cell" style="background:${bg};cursor:pointer;" onclick="showCellPopover('${proj.id}',${m},${y})" title="${proj.name} · ${MONTHS[m]} ${y}">
          <div style="font-weight:600;font-size:11px;color:${col};">${days}d</div>
          ${loeDays>0?`<div style="font-size:9px;color:${col};opacity:0.8;">${label||'LOE '+loeDays+'d'}</div>`:`<div style="font-size:9px;color:var(--text-3);">no LOE</div>`}
        </div>
      </td>`;
    }).join("");
    return`<tr>
      <td style="padding:6px 8px;white-space:nowrap;">
        <div style="display:flex;align-items:center;gap:4px;">
          <span style="font-size:11px;">${statusIcon}</span>
          <span style="font-size:11px;font-weight:500;color:var(--plum);">${proj.name}</span>
        </div>
        <div style="font-size:10px;color:var(--text-3);">${proj.client}</div>
      </td>${cols}
    </tr>`;
  }).join("");

  return`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:auto;">
    <table style="width:100%;border-collapse:separate;border-spacing:2px;font-size:11px;">
      <thead><tr style="background:var(--off-white);"><th style="text-align:left;padding:6px 8px;min-width:160px;color:var(--text-3);font-weight:600;">Project</th>${thCols}</tr></thead>
      <tbody>${rows||`<tr><td colspan="99" style="padding:20px;text-align:center;color:var(--text-3);">No project data for this window.</td></tr>`}</tbody>
    </table>
    <div style="padding:8px 12px;font-size:10px;color:var(--text-3);font-style:italic;border-top:1px solid var(--border);">
      🟢 on LOE · 🟡 slightly over · 🔴 over LOE · grey = under LOE (may be fine) · chalk = no LOE data · click cell to see who is allocated
    </div>
  </div>`;
}

const AI_SUGGESTIONS=["Who has spare capacity this month?","What are our contract risks?","Who can lead on blended finance?","Which projects are under LOE budget?","Who has climate expertise and is available?"];
function renderAISuggs(){
  const el=document.getElementById('ai-suggs');

function appendAIMsg(role,content){
  const el=document.getElementById('ai-msgs');if(!el)return;
  if(aiMessages.length===1&&role==='user')el.innerHTML="";
  const div=document.createElement('div');
  div.style.cssText=`max-width:85%;padding:8px 11px;border-radius:${role==='user'?'10px 10px 3px 10px':'3px 10px 10px 10px'};font-size:12px;line-height:1.5;align-self:${role==='user'?'flex-end':'flex-start'};background:${role==='user'?'var(--plum)':'var(--chalk)'};color:${role==='user'?'white':'var(--text)'};`;
  div.innerHTML=content.replace(/\n/g,'<br>');el.appendChild(div);el.scrollTop=el.scrollHeight;
}

async function sendAI(prefill){
  const input=document.getElementById('ai-input'),btn=document.getElementById('ai-send-btn');
  const text=(prefill||input.value).trim();if(!text||aiLoading)return;
  input.value='';aiLoading=true;if(btn)btn.disabled=true;
  aiMessages.push({role:'user',content:text});appendAIMsg('user',text);renderAISuggs();
  const teamCtx=people.map(p=>{
    const av=avail(p),bill=billAlloc(p.id),tgt=targetDays(p),free=Math.max(0,av-totalAlloc(p.id)),leaveD=leaveDays(p);
    const als=pa(p.id).map(a=>{const proj=projects.find(x=>x.id===a.pr);return(proj?proj.name:(a.prName||a.pr))+':'+a.d+'d('+a.st+')';}).join(', ');
    const topSkills=Object.entries(p.skills||{}).filter(([k,v])=>v>=3).map(([k])=>{const s=SS.find(x=>x.id===k);return s?s.l:null;}).filter(Boolean).join(', ');
    const topThemes=Object.entries(p.themes||{}).filter(([k,v])=>v>=3).map(([k])=>k).join(', ');
    return`${p.name} (L${p.level}, ${p.pillar}${leaveD>0?', '+leaveD+'d leave':''}): ${bill}/${av}d billable, ${free}d free. ${als}${topSkills?'. Strong: '+topSkills:''}${topThemes?'. Themes: '+topThemes:''}.`;
  }).join('\n');
  const wm_ai=windowMonths();
  const monthsCtx=wm_ai.map(({m,y,label})=>{
    const lines=people.map(p=>{
      const av2=avail(p,m,y),bill2=billAlloc(p.id,m,y),tot2=totalAlloc(p.id,m,y),free2=Math.max(0,av2-tot2),lv2=leaveDays(p,m,y);
      if(tot2===0&&lv2===0)return null;
      return p.name+': '+bill2+'/'+av2+'d billable, '+free2+'d free'+(lv2>0?', '+lv2+'d leave':'');
    }).filter(Boolean).join('; ');
    return label+':\n'+lines;
  }).join('\n\n');
  const context=`=== CARIBOU RESOURCE PLANNER — ${wm_ai.map(w=>w.label).join(' + ')} ===\nTargets: L5=80%, L4=80%, L3=90%, L2=95%. 19d/month base. BD not billable.\n\nAVAILABILITY BY MONTH:\n${monthsCtx}\n\nCURRENT MONTH DETAIL:\n${teamCtx}`;
  const typingId='t-'+Date.now();const td=document.createElement('div');td.id=typingId;
  td.style.cssText='padding:8px 11px;border-radius:3px 10px 10px 10px;font-size:12px;background:var(--chalk);color:var(--text-3);align-self:flex-start;';td.textContent='Thinking...';
  const msgsEl=document.getElementById('ai-msgs');if(msgsEl){msgsEl.appendChild(td);msgsEl.scrollTop=msgsEl.scrollHeight;}
  try{
    const res=await fetch(NETLIFY_FN,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:aiMessages.map(m=>({role:m.role,content:m.content})),context})});
    const data=await res.json();document.getElementById(typingId)?.remove();
    const reply=data.reply||'No response.';aiMessages.push({role:'assistant',content:reply});appendAIMsg('assistant',reply);
  }catch(e){document.getElementById(typingId)?.remove();appendAIMsg('assistant','Connection error.');}
  aiLoading=false;if(btn)btn.disabled=false;
}

function render(){
  document.getElementById("mon-label").textContent=MONTHS[curMonth]+" "+curYear;
  console.log("render() called: curMonth="+curMonth+" curYear="+curYear+" allocs keys="+Object.keys(allocs).join(",")+" data for this month="+((allocs[curMonth+(curYear-2026)*12]||[]).length)+"entries");
  renderAlerts();
  const hints={overview:"Click cards for detail · toggle months to aggregate",people:"Click a person to expand · filter by project or BD status · click month bars to navigate",projects:"Filter by client or person · click a project to expand · click matrix cells to see who is allocated",skills:"Select themes or sub-services to filter · ⭐ interested through ⭐⭐⭐ expert"};
  document.getElementById("view-hint").innerHTML=hints[curView]||"";
  if(curView==="overview")renderOverview();
  else if(curView==="people")renderPeople();
  else if(curView==="projects")renderProjects();
  else renderSkills();
}

(async function boot(){
  const overlay=document.getElementById('loading-overlay'),status=document.getElementById('loading-status');
  status.textContent='Fetching from Notion...';
  const ok=await loadNotionData();
  if(!ok){status.textContent='Notion unavailable — check worker';await new Promise(r=>setTimeout(r,1200));}
  overlay.style.opacity='0';overlay.style.transition='opacity 0.3s';
  setTimeout(()=>overlay.style.display='none',300);
  renderAlerts();
  setTimeout(renderAISuggs,400);
  render();
})();
</script>
